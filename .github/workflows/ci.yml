name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run lint
        run: npm run lint

      # Type-check separately because the Next.js build skips type-checking
      # to keep memory usage lower on constrained runners.
      - name: Type-check
        run: npx tsc --noEmit

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          # Use a temporary SQLite database for build-time Prisma operations.
          # Override this in repository secrets if your build requires a different database.
          DATABASE_URL: file:/tmp/money-tracker-build.db
          # JWT secret pulled from repository secrets.
          # Configure at: https://github.com/robprian/doit/settings/secrets/actions
          # If your build/runtime requires this secret, the job will fail when unset.
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXT_TELEMETRY_DISABLED: 1
