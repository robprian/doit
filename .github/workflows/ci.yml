name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run lint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build
        env:
          # Use a temporary SQLite database for build-time Prisma operations.
          # Override this in repository secrets if your build requires a different database.
          DATABASE_URL: file:/tmp/money-tracker-build.db
          # JWT secret used only for the CI build; replace via repository secrets for production.
          JWT_SECRET: ci-jwt-secret
