name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # package-lock.json is not committed yet, so use npm install.
      # Switch to npm ci once a lockfile is committed.
      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run lint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build
        env:
          # Use a temporary SQLite database for build-time Prisma operations.
          # Override this in repository secrets if your build requires a different database.
          DATABASE_URL: file:/tmp/money-tracker-build.db
          # JWT secret pulled from repository secrets; configure under Settings > Secrets.
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret' }}
          NEXT_TELEMETRY_DISABLED: 1
